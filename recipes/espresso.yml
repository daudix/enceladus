---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: enceladus
description: My personal modification of uCore.

alt-tags:
  - espresso
  - server
base-image: ghcr.io/ublue-os/ucore-minimal
image-version: stable

modules:
  - type: dnf
    repos:
      cleanup: true
      files:
        - https://raw.githubusercontent.com/rpmfusion/rpmfusion-nonfree-release/refs/heads/f43/rpmfusion-nonfree-tainted.repo
      keys:
        - https://raw.githubusercontent.com/rpmfusion/rpmfusion-nonfree-release/refs/heads/f43/RPM-GPG-KEY-rpmfusion-nonfree-fedora-2020
      nonfree: rpmfusion
    group-install:
      with-optional: true
      packages:
        - printing
    install:
      packages:
        - beep
        - lm_sensors
        - nouveau-firmware
        # uCore packages from normal edition, without all the bloat
        - cockpit-storaged
        - duperemove
        - man-db
        - pcp-zeroconf
        - rclone
        - samba
        - samba-usershares
        - smartctl
        - snapraid
        - xdg-dbus-proxy
        - xdg-user-dirs
    remove:
      packages:
        # uCore packages from minimal edition
        - docker-buildx
        - docker-compose
        - open-vm-tools
        - podman-compose
        - qemu-guest-agent
        - tailscale
    # replace:
    #   - from-repo: updates
    #     packages:
    #     - old: nfs-utils
    #       new: nfs-utils-coreos
  - type: signing
