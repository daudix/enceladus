---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: enceladus
description: My personal modification of uCore.

alt-tags:
  - espresso
  - server
base-image: ghcr.io/ublue-os/ucore-minimal
image-version: stable

modules:
  - type: dnf
    repos:
      cleanup: true
      files:
        - https://raw.githubusercontent.com/rpmfusion/rpmfusion-nonfree-release/refs/heads/f43/rpmfusion-nonfree-tainted.repo
      keys:
        - https://raw.githubusercontent.com/rpmfusion/rpmfusion-nonfree-release/refs/heads/f43/RPM-GPG-KEY-rpmfusion-nonfree-fedora-2020
      nonfree: rpmfusion
    group-install:
      with-optional: true
      packages:
        - printing
    install:
      packages:
        - beep
        - lm_sensors
        - nouveau-firmware
        # uCore packages from normal edition, without all the bloat
        # - NetworkManager-wifi
        # - atheros-firmware
        # - brcmfmac-firmware
        - cockpit-storaged
        # - distrobox
        - duperemove
        - hdparm
        # - iwlegacy-firmware
        # - iwlwifi-dvm-firmware
        # - iwlwifi-mvm-firmware
        - man-db
        # - mt7xxx-firmware
        # - nxpwireless-firmware
        - pciutils
        - pcp-zeroconf
        - rclone
        # - realtek-firmware
        - samba
        - samba-usershares
        - smartctl
        - snapraid
        # - tiwilink-firmware
        - usbutils
        - xdg-dbus-proxy
        - xdg-user-dirs
    remove:
      packages:
        # uCore packages from minimal edition
        # - bootc
        # - cockpit-files
        # - cockpit-networkmanager
        # - cockpit-podman
        # - cockpit-selinux
        # - cockpit-system
        - docker-buildx
        - docker-compose
        # - firewalld
        # - fwupd-efi
        - open-vm-tools
        # - podman
        - podman-compose
        # - pv
        - qemu-guest-agent
        - tailscale
        # - tmux
        # - wireguard-tools
    replace:
      # - from-repo: repo-1
      packages:
        - old: nfs-utils
          new: nfs-utils-coreos
  - type: signing
